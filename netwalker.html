<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETWATCH // LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', Monaco, monospace;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #0a0a15, #15152a);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a3a;
        }

        h1 {
            font-size: 1.4rem;
            color: #00d4ff;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .last-updated {
            color: #888;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
        }

        .card {
            background: #0a0a12;
            border-radius: 12px;
            border: 1px solid #1a1a2a;
            padding: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1a1a2a;
        }

        .card-title {
            font-size: 0.8rem;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .price-usd {
            color: #00d4ff;
        }

        .price-btc {
            color: #f90;
        }

        .change {
            font-size: 1rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        .change-positive {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }

        .change-negative {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
        }

        .metrics {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .metric {
            background: #0f0f20;
            padding: 10px 15px;
            border-radius: 8px;
            flex: 1;
        }

        .metric-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 0.95rem;
            color: #e0e0e0;
        }

        .loading {
            color: #666;
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
        }

        .error {
            color: #ff4444;
            text-align: center;
            padding: 40px;
        }

        .refresh-btn {
            background: #1a1a2a;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #00d4ff;
            color: #000;
        }

        .refreshing {
            opacity: 0.5;
            cursor: wait;
        }

        @media (max-width: 768px) {
            .price { font-size: 1.8rem; }
            .change { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Marketwatch</h1>
            <div class="subtitle">Live Crypto Prices & Weather</div>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Bitcoin</span>
                    <span style="font-size: 2rem;">₿</span>
                </div>
                <div id="btc-card">
                    <div class="loading">Loading live data...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Ethereum</span>
                    <span style="font-size: 2rem;">Ξ</span>
                </div>
                <div id="eth-card">
                    <div class="loading">Loading live data...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Solana</span>
                    <span style="font-size: 2rem;">◎</span>
                </div>
                <div id="sol-card">
                    <div class="loading">Loading live data...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Weather — Chicago</span>
                    <span style="font-size: 2rem;">🌡</span>
                </div>
                <div id="weather-card">
                    <div class="loading">Loading weather...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const REFRESH_INTERVAL = 60000; // 1 minute

        async function fetchCryptoPrices() {
            try {
                const response = await fetch(
                    'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd,btc&include_24hr_change=true'
                );
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Failed to fetch crypto:', error);
                return null;
            }
        }

        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto`
                );
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Failed to fetch weather:', error);
                return null;
            }
        }

        function renderCryptoCard(symbol, data) {
            const price = data.usd;
            const change = data.usd_24h_change;
            const btcPrice = data.btc;

            const changeClass = change >= 0 ? 'change-positive' : 'change-negative';
            const changeIcon = change >= 0 ? '+' : '';

            return `
                <div class="price price-$btc ? 'price-btc' : 'price-usd'">
                    ${symbol === 'BTC' ? '$' : ''}${price.toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                })}
                    ${symbol === 'BTC' ? ' USD' : ''}
                </div>
                <div class="change ${changeClass}">
                    ${changeIcon}${change.toFixed(2)}%
                </div>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-label">BTC Value</div>
                        <div class="metric-value">₿${btcPrice.toFixed(8)}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">24h Volume</div>
                        <div class="metric-value">Live</div>
                    </div>
                </div>
            `;
        }

        function renderWeatherCard(data) {
            const current = data.current;
            const temp = Math.round(current.temperature_2m);
            const windSpeed = Math.round(current.wind_speed_10m);
            const weatherCode = current.weather_code;

            const weatherDescriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Fog',
                48: 'Depositing rime fog',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                56: 'Light freezing drizzle',
                57: 'Dense freezing drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                66: 'Light freezing rain',
                67: 'Heavy freezing rain',
                71: 'Light snow fall',
                73: 'Moderate snow fall',
                75: 'Heavy snow fall',
                77: 'Snow grains',
                80: 'Light rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Snow showers',
                95: 'Thunderstorm'
            };

            const description = weatherDescriptions[weatherCode] || 'Unknown';
            const emoji = weatherCode === 0 ? '☀' : weatherCode === 1 ? '🌤' : weatherCode === 2 ? '⛅' : weatherCode === 3 ? '☁' : weatherCode >= 45 && weatherCode <= 48 ? '🌫' : weatherCode >= 51 && weatherCode <= 67 ? '🌧' : weatherCode >= 71 && weatherCode <= 77 ? '🌨' : weatherCode >= 80 && weatherCode <= 82 ? '🌧' : weatherCode >= 85 && weatherCode <= 86 ? '🌨' : weatherCode >= 95 ? '⛈' : '?';

            return `
                <div class="price">${emoji} ${temp}°C</div>
                <div style="font-size: 1.1rem; color: #888;">${description}</div>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-label">Wind Speed</div>
                        <div class="metric-value">${windSpeed} km/h</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Last Updated</div>
                        <div class="metric-value" id="weather-time">Now</div>
                    </div>
                </div>
            `;
        }

        async function loadData() {
            const btn = document.querySelector('.refresh-btn');
            if (btn) {
                btn.classList.add('refreshing');
                btn.textContent = 'Refreshing...';
            }

            // Crypto prices
            const cryptoData = await fetchCryptoPrices();
            if (cryptoData) {
                document.getElementById('btc-card').innerHTML = renderCryptoCard('BTC', cryptoData.bitcoin);
                document.getElementById('eth-card').innerHTML = renderCryptoCard('ETH', cryptoData.ethereum);
                document.getElementById('sol-card').innerHTML = renderCryptoCard('SOL', cryptoData.solana);
            } else {
                document.getElementById('btc-card').innerHTML = '<div class="load">Error loading crypto data</div>';
                document.getElementById('eth-card').innerHTML = '<div class="loading">Error loading crypto data</div>';
                document.getElementById('sol-card').innerHTML = '<div class="loading">Error loading crypto data</div>';
            }

            // Weather for Chicago
            const weatherData = await fetchWeather(41.87, -87.62); // Chicago coordinates
            if (weatherData) {
                document.getElementById('weather-card').innerHTML = renderWeatherCard(weatherData);
                const now = new Date();
                document.getElementById('weather-time').textContent = now.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } else {
                document.getElementById('weather-card').innerHTML = '<div class="error">Error loading weather</div>';
            }

            // Update timestamp
            const now = new Date();
            document.getElementById('lastUpdated').textContent = `Last updated: ${now.toLocaleString('en-US', {
                weekday: 'long',
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZoneName: 'short'
            })}`;

            if (btn) {
                btn.classList.remove('refreshing');
                btn.textContent = 'Refresh Now';
            }
        }

        // Initial load
        loadData();

        // Auto-refresh every minute
        setInterval(loadData, REFRESH_INTERVAL);

        // Add refresh button
        document.addEventListener('DOMContentLoaded', () => {
            const header = document.querySelector('.subtitle');
            const btn = document.createElement('button');
            btn.className = 'refresh-btn';
            btn.textContent = 'Refresh Now';
            btn.onclick = loadData;
            header.parentElement.appendChild(btn);
        });
    </script>
</body>
</html>
